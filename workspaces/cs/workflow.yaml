id: cs_default_v2
workspace: cs
description: 客服 6-step — Router → (Tool / Knowledge / Policy / Tone 並行) → Composer
trigger: on_user_message

steps:
  - id: router
    agent: router
    input:
      message: $event.message
      history: $context.history

  # TA4：tool_agent 跟 knowledge / policy / tone 同層並行（都只依賴 router）
  # tool_agent 沒命中時 tool_result=null，composer 走原本 RAG 流程
  - id: tool_agent
    agent: tool_agent
    input:
      message: $event.message
      intent: $router

  - id: knowledge
    agent: knowledge
    input:
      query: $event.message
      workspace_id: $context.workspace_id
      kb_name: faq
      top_k: 5

  - id: policy
    agent: policy
    input:
      message: $event.message
      intent: $router
      category: $router.category

  - id: tone
    agent: tone
    input:
      message: $event.message
      history: $context.history
      intent: $router

  - id: composer
    agent: composer
    input:
      message: $event.message
      intent: $router
      docs: $knowledge.docs
      tone: $tone.tone
      tone_rationale: $tone.rationale
      policy: $policy
      tool_called: $tool_agent.tool_called
      tool_result: $tool_agent.tool_result

emit:
  draft: $composer.text
  citations: $composer.citations
  policy: $policy
  tone: $tone
  tool: $tool_agent
